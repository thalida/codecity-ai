<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>engine.js — Visual Test</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0b10;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #legend {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.8;
      pointer-events: none;
    }
    #legend h3 { font-size: 13px; margin-bottom: 6px; color: #fff; }
    #legend .row { display: flex; gap: 8px; align-items: center; }
    #legend .swatch {
      width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="legend">
    <h3>engine.js Visual Test</h3>
    <div class="row"><span class="swatch" style="background:hsl(210,80%,50%)"></span> TypeScript / Blue (tall + windows)</div>
    <div class="row"><span class="swatch" style="background:hsl(15,70%,45%)"></span> Python / Orange (medium)</div>
    <div class="row"><span class="swatch" style="background:hsl(150,60%,40%)"></span> CSS / Green (short)</div>
    <div class="row"><span class="swatch" style="background:hsl(275,55%,48%)"></span> Markdown / Purple (wide)</div>
    <div class="row"><span class="swatch" style="background:hsl(50,75%,48%)"></span> JSON / Yellow (small)</div>
    <div class="row"><span class="swatch" style="background:hsl(5,80%,42%)"></span> Rust / Red (very tall)</div>
    <div class="row"><span class="swatch" style="background:rgba(30,40,60,0.9)"></span> Ground blocks</div>
  </div>

  <!-- Load the engine — path relative to this test file -->
  <script src="../../renderer/engine.js"></script>

  <script>
    // -------------------------------------------------------------------------
    // Visual test: draw a small grid of buildings with varied sizes and colors
    // to verify the isometric rendering engine visually.
    //
    // The test is intentionally minimal — open this HTML in a browser and
    // eyeball the result. No assertions, no test framework.
    // -------------------------------------------------------------------------

    var canvas = document.getElementById('c');
    var ctx    = setupCanvas(canvas);

    // Canvas logical (CSS) size
    var W = canvas.getBoundingClientRect().width;
    var H = canvas.getBoundingClientRect().height;

    // Re-read after setupCanvas (it sets width/height which clears the rect)
    W = canvas.offsetWidth;
    H = canvas.offsetHeight;

    // Translate origin to center of canvas so the city is centered
    ctx.translate(W / 2, H / 2);

    // ---- Ground blocks -------------------------------------------------------
    // Draw a 3×3 grid of ground tiles before the buildings (painter's algorithm)
    var TILE_W = 60;
    var TILE_D = 60;
    var GAP    = 10; // street gap between tiles

    // Ground color — dark blue-grey
    var groundFill   = 'rgba(18, 24, 40, 0.95)';
    var groundStroke = 'rgba(60, 80, 120, 0.4)';

    // Tile grid positions in world coordinates
    // Each tile is spaced by (TILE_W + GAP) in x and (TILE_D + GAP) in y
    var STRIDE_X = TILE_W + GAP;
    var STRIDE_Y = TILE_D + GAP;

    var GRID = 3; // 3×3 grid

    // Draw ground tiles back-to-front (higher x+y first in isometric view)
    for (var gy = GRID - 1; gy >= 0; gy--) {
      for (var gx = GRID - 1; gx >= 0; gx--) {
        var wx = (gx - (GRID - 1) / 2) * STRIDE_X;
        var wy = (gy - (GRID - 1) / 2) * STRIDE_Y;

        // Project world center to screen
        var gp = isoProject(wx, wy, 0);
        drawGround(ctx, gp.sx, gp.sy, TILE_W, TILE_D, groundFill, groundStroke);
      }
    }

    // ---- Buildings -----------------------------------------------------------
    // Define a set of test buildings: varied sizes, hues, and positions across
    // the grid tiles. Each entry is [gridX, gridY, w, d, h, hslColor, label].
    var buildings = [
      // Tile (0,0) — tall TypeScript-ish building with windows
      [0, 0,  18, 14, 60, 'hsl(210, 80%, 50%)', 'TS tall'],

      // Tile (1,0) — medium Python-ish building
      [1, 0,  14, 12, 35, 'hsl(15, 70%, 45%)', 'PY med'],

      // Tile (2,0) — short CSS-ish building
      [2, 0,  10,  8, 18, 'hsl(150, 60%, 40%)', 'CSS short'],

      // Tile (0,1) — wide Markdown-ish building
      [0, 1,  22, 10, 25, 'hsl(275, 55%, 48%)', 'MD wide'],

      // Tile (1,1) — center: small JSON config building
      [1, 1,   8,  8, 12, 'hsl(50, 75%, 48%)', 'JSON sm'],

      // Tile (2,1) — very tall Rust-ish building (tests extreme height)
      [2, 1,  14, 12, 90, 'hsl(5, 80%, 42%)', 'RS very tall'],

      // Tile (0,2) — skinny Go building
      [0, 2,   8, 16, 40, 'hsl(185, 65%, 45%)', 'GO skinny'],

      // Tile (1,2) — wide-short Shell script building
      [1, 2,  20,  8, 14, 'hsl(35, 70%, 44%)', 'SH flat'],

      // Tile (2,2) — minimal building (near min dimensions — tests low-h, no windows)
      [2, 2,   6,  6,  6, 'hsl(220, 50%, 55%)', 'min'],
    ];

    // Sort buildings back-to-front: higher (gx + gy) renders first (they are
    // "behind" in the isometric view). Within same sum, higher gy goes first.
    buildings.sort(function(a, b) {
      var sumA = a[0] + a[1];
      var sumB = b[0] + b[1];
      if (sumB !== sumA) return sumB - sumA;
      return b[1] - a[1];
    });

    for (var i = 0; i < buildings.length; i++) {
      var b = buildings[i];
      var bgx = b[0], bgy = b[1];
      var bw = b[2], bd = b[3], bh = b[4];
      var color = b[5];

      // World position: center of this grid tile
      var bwx = (bgx - (GRID - 1) / 2) * STRIDE_X;
      var bwy = (bgy - (GRID - 1) / 2) * STRIDE_Y;

      // Screen position of the tile center (the base of the building sits on z=0)
      var bp = isoProject(bwx, bwy, 0);

      drawBuilding(ctx, bp.sx, bp.sy, bw, bd, bh, color);
    }

    // ---- Edge-case buildings below the main grid --------------------------------
    // These verify specific boundary conditions for the window and shading logic.
    // They sit below the 3×3 grid in screen space (offset by 160px downward from
    // the canvas center, which is our translated origin).
    var extraOffsetY = 160;

    // Ground tile drawn first (painter's algorithm)
    drawGround(ctx, 0, extraOffsetY + 10, 220, 50,
      'rgba(10, 15, 30, 0.7)', 'rgba(60, 80, 120, 0.35)');

    // Min-size building: w=6, d=6, h=4 — renders but no windows (h ≤ 14)
    var eMin = isoProject(-80, 0, 0);
    drawBuilding(ctx, eMin.sx, eMin.sy + extraOffsetY, 6, 6, 4,  'hsl(200, 40%, 50%)');

    // Tall thin: w=6, d=6, h=30 — h > 14 but w ≤ 6 and d ≤ 6, so no windows
    var eThin = isoProject(-50, 0, 0);
    drawBuilding(ctx, eThin.sx, eThin.sy + extraOffsetY, 6, 6, 30, 'hsl(200, 70%, 55%)');

    // Just over threshold: w=7, d=7, h=15 — should show windows (h > 14 and w > 6)
    var eWin = isoProject(-10, 0, 0);
    drawBuilding(ctx, eWin.sx, eWin.sy + extraOffsetY, 7, 7, 15, 'hsl(180, 65%, 48%)');

    // Wide short: w=20, d=8, h=10 — no windows (h ≤ 14)
    var eWide = isoProject( 30, 0, 0);
    drawBuilding(ctx, eWide.sx, eWide.sy + extraOffsetY, 20, 8, 10, 'hsl(45, 70%, 48%)');
  </script>
</body>
</html>
