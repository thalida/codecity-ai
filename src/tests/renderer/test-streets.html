<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Street Rendering Test</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0b10;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      overflow: auto;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #12131a;
      border-bottom: 1px solid #1e2030;
      padding: 10px 16px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .toolbar h1 { font-size: 14px; font-weight: 600; }
    .toolbar label {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .legend {
      display: flex;
      gap: 14px;
      font-size: 11px;
      color: #8a8ea0;
      margin-left: auto;
    }
    .swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      vertical-align: middle;
      margin-right: 4px;
    }
    .grid {
      display: grid;
      gap: 16px;
      padding: 16px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }
    .cell {
      background: #10111a;
      border: 1px solid #1e2030;
      border-radius: 6px;
      padding: 8px;
    }
    .cell .title {
      font-size: 12px;
      color: #c0c4d8;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .cell canvas {
      width: 100%;
      height: 220px;
      display: block;
      background: #0e0f17;
      border-radius: 4px;
    }
    .cell .meta {
      font-size: 11px;
      color: #6a7090;
      margin-top: 6px;
      font-family: 'SF Mono', monospace;
    }
    .section {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #44485e;
      padding: 12px 4px 4px;
      border-bottom: 1px solid #1a1c28;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>Street Rendering Test</h1>
    <label>
      <input type="checkbox" id="showCenters">
      Show centers + bounds
    </label>
    <div class="legend">
      <span><span class="swatch" style="background:#1a1d28"></span>Asphalt</span>
      <span><span class="swatch" style="background:#2a3050"></span>Sidewalk</span>
    </div>
  </div>
  <div class="grid" id="grid"></div>

  <script src="../../renderer/engine.js"></script>
  <script>
    // =========================================================================
    // SCENARIO HELPERS
    //
    // Street primitives (drawStreet / drawStreets / STREET_COLORS) are loaded
    // from engine.js. Below are just convenience wrappers for placing buildings
    // in world coords plus painter's-order sorting.
    // =========================================================================

    // -----------------------------------------------------------------------
    // drawBuildingAt(ctx, x, y, w, d, h, hue, orientation)
    //
    // Convenience wrapper to place a building at a world-space position using
    // the production drawBuilding from engine.js.
    // -----------------------------------------------------------------------
    function drawBuildingAt(ctx, x, y, w, d, h, hue, orientation) {
      var p = isoProject(x, y, 0);
      var color = 'hsl(' + (hue != null ? hue : 215) + ', 60%, 50%)';
      drawBuilding(ctx, p.sx, p.sy, w, d, h, color, orientation);
    }

    // -----------------------------------------------------------------------
    // pathFor(building) -> path opts | null
    //
    // Mirrors layout.js's _pathForBuilding: thin sidewalk-colored strip
    // connecting the building's door to the adjacent street.
    // -----------------------------------------------------------------------
    var PATH_LENGTH = 4;   // street width / 2 (= 7) — body offset (= 11) + perp pad
    var PATH_WIDTH  = 3;
    function pathFor(b) {
      if (b.orient === 's') {
        return { x: b.x, y: b.y + b.d / 2 + PATH_LENGTH / 2, w: PATH_WIDTH, d: PATH_LENGTH };
      }
      if (b.orient === 'e') {
        return { x: b.x + b.w / 2 + PATH_LENGTH / 2, y: b.y, w: PATH_LENGTH, d: PATH_WIDTH };
      }
      if (b.orient === 'n') {
        return { x: b.x, y: b.y - b.d / 2 - PATH_LENGTH / 2, w: PATH_WIDTH, d: PATH_LENGTH };
      }
      if (b.orient === 'w') {
        return { x: b.x - b.w / 2 - PATH_LENGTH / 2, y: b.y, w: PATH_LENGTH, d: PATH_WIDTH };
      }
      return null;
    }

    // -----------------------------------------------------------------------
    // Sort buildings back-to-front for proper painter's order, AND draw a
    // sidewalk-colored path under each one (between street and building).
    // -----------------------------------------------------------------------
    function paintBuildings(ctx, buildings) {
      // Paths first so they render on the ground beneath the buildings
      var paths = [];
      for (var i = 0; i < buildings.length; i++) {
        var p = pathFor(buildings[i]);
        if (p) paths.push(p);
      }
      drawPaths(ctx, paths);

      var sorted = buildings.slice().sort(function (a, b) {
        return (a.x + a.y) - (b.x + b.y);
      });
      for (var j = 0; j < sorted.length; j++) {
        var b = sorted[j];
        drawBuildingAt(ctx, b.x, b.y, b.w, b.d, b.h, b.hue, b.orient);
      }
    }

    // =========================================================================
    // TEST SCENARIOS
    //
    // Each scenario specifies:
    //   title   — display name
    //   section — group heading
    //   bounds  — { x, y, h } half-extents in world units; used for autofit
    //   meta    — short description shown under the canvas
    //   draw    — function(ctx) that paints the scene
    // =========================================================================

    var SCENARIOS = [
      // --------------------------------------------------------------------
      // Streets only — no buildings, no branches
      // --------------------------------------------------------------------
      { section: "Empty streets" },
      {
        title: "Short street",
        meta: "len=40 wid=14",
        bounds: { x: 25, y: 10, h: 0 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 40, width: 14 });
        }
      },
      {
        title: "Medium street (with label)",
        meta: "len=80 wid=14",
        bounds: { x: 45, y: 10, h: 0 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 80, width: 14, label: 'src' });
        }
      },
      {
        title: "Long street",
        meta: "len=140 wid=14",
        bounds: { x: 75, y: 10, h: 0 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 140, width: 14, label: 'components' });
        }
      },
      {
        title: "Wide street (boulevard)",
        meta: "len=80 wid=26",
        bounds: { x: 45, y: 16, h: 0 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 80, width: 26, label: 'main' });
        }
      },
      {
        title: "Narrow street (alley)",
        meta: "len=80 wid=8",
        bounds: { x: 45, y: 8, h: 0 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 80, width: 8, label: 'utils' });
        }
      },

      // --------------------------------------------------------------------
      // Streets with buildings
      // --------------------------------------------------------------------
      { section: "Streets with buildings" },
      {
        title: "Street + 1 building",
        meta: "1 file (south side)",
        bounds: { x: 25, y: 18, h: 28 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 40, width: 14, label: 'lib' });
          paintBuildings(ctx, [
            { x: 0, y: -12, w: 8, d: 6, h: 24, orient: 's' },
          ]);
        }
      },
      {
        title: "Street + 3 buildings (one side)",
        meta: "3 files (all face north)",
        bounds: { x: 50, y: 22, h: 36 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 80, width: 14, label: 'lib' });
          paintBuildings(ctx, [
            { x: -25, y: -12, w: 10, d: 6, h: 28, orient: 's' },
            { x:   0, y: -12, w: 10, d: 6, h: 18, orient: 's' },
            { x:  25, y: -12, w: 10, d: 6, h: 36, orient: 's' },
          ]);
        }
      },
      {
        title: "Buildings on both sides",
        meta: "south face north (door visible); north face south (door hidden)",
        bounds: { x: 60, y: 22, h: 40 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 100, width: 14, label: 'src' });
          paintBuildings(ctx, [
            // South side: door faces +y (toward street). orient='s'.
            { x: -33, y: -12, w: 10, d: 6, h: 22, orient: 's' },
            { x:  -8, y: -12, w: 10, d: 6, h: 30, orient: 's' },
            { x:  17, y: -12, w: 10, d: 6, h: 16, orient: 's' },
            // North side: door faces -y (toward street, but hidden from camera).
            { x: -22, y:  12, w: 10, d: 6, h: 28, orient: 'n' },
            { x:   8, y:  12, w: 10, d: 6, h: 36, orient: 'n' },
            { x:  33, y:  12, w: 10, d: 6, h: 20, orient: 'n' },
          ]);
        }
      },
      {
        title: "Long street + many buildings",
        meta: "12 files (varied size)",
        bounds: { x: 90, y: 22, h: 50 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 160, width: 14, label: 'app' });
          var bldgs = [];
          for (var i = 0; i < 6; i++) {
            var x = -65 + i * 26;
            bldgs.push({ x: x,      y: -12, w: 10, d: 6, h: 12 + (i * 7)  % 30, orient: 's' });
            bldgs.push({ x: x + 13, y:  12, w: 10, d: 6, h: 18 + (i * 11) % 28, orient: 'n' });
          }
          paintBuildings(ctx, bldgs);
        }
      },
      {
        title: "Wide street + bigger buildings",
        meta: "boulevard with offices",
        bounds: { x: 50, y: 30, h: 60 },
        draw: function (ctx) {
          drawStreet(ctx, { x: 0, y: 0, length: 90, width: 26, label: 'main' });
          paintBuildings(ctx, [
            // South side faces +y (door visible)
            { x: -28, y: -19, w: 16, d: 10, h: 50, orient: 's' },
            { x:   0, y: -19, w: 16, d: 10, h: 38, orient: 's' },
            { x:  28, y: -19, w: 16, d: 10, h: 56, orient: 's' },
            // North side faces -y (door hidden)
            { x: -28, y:  19, w: 16, d: 10, h: 32, orient: 'n' },
            { x:   0, y:  19, w: 16, d: 10, h: 44, orient: 'n' },
            { x:  28, y:  19, w: 16, d: 10, h: 26, orient: 'n' },
          ]);
        }
      },

      // --------------------------------------------------------------------
      // Streets with branches (subdirectories)
      // --------------------------------------------------------------------
      { section: "Branches (subdirectories)" },
      {
        title: "T-intersection (1 branch)",
        meta: "main + 1 subdir",
        bounds: { x: 45, y: 55, h: 0 },
        draw: function (ctx) {
          // Branch extends from y=0 (main's centerline) up to y=50. The half
          // of the branch that's inside main's footprint is covered by main's
          // asphalt, so only the +y side is visible — but the branch's asphalt
          // still meets main's asphalt cleanly with no sidewalk gap.
          drawStreets(ctx, [
            { x: 0, y: 0, length: 80, width: 14, label: 'app' },
            { x: 0, y: 25, length: 50, width: 14, orientation: 'y', label: 'utils' },
          ]);
        }
      },
      {
        title: "3 branches off main",
        meta: "main + 3 subdirs",
        bounds: { x: 70, y: 55, h: 0 },
        draw: function (ctx) {
          drawStreets(ctx, [
            { x: 0, y: 0, length: 130, width: 14, label: 'app' },
            { x: -45, y: 25, length: 50, width: 14, orientation: 'y', label: 'a' },
            { x:   0, y: 25, length: 50, width: 14, orientation: 'y', label: 'b' },
            { x:  45, y: 25, length: 50, width: 14, orientation: 'y', label: 'c' },
          ]);
        }
      },
      {
        title: "Branches both sides",
        meta: "T-junctions on opposite sides (no 4-ways)",
        bounds: { x: 60, y: 55, h: 0 },
        draw: function (ctx) {
          drawStreets(ctx, [
            { x: 0, y: 0, length: 110, width: 14, label: 'src' },
            { x: -30, y:  25, length: 50, width: 14, orientation: 'y', label: 'lib' },
            { x:  30, y:  25, length: 50, width: 14, orientation: 'y', label: 'utils' },
            { x:   0, y: -25, length: 50, width: 14, orientation: 'y', label: 'tests' },
          ]);
        }
      },

      // --------------------------------------------------------------------
      // Mixed: branches + buildings
      // --------------------------------------------------------------------
      { section: "Mixed (files + subdirs)" },
      {
        title: "Files + 2 branches",
        meta: "src/ with files & subdirs",
        bounds: { x: 70, y: 55, h: 38 },
        draw: function (ctx) {
          drawStreets(ctx, [
            { x: 0, y: 0, length: 120, width: 14, label: 'src' },
            { x: -30, y: 25, length: 50, width: 14, orientation: 'y', label: 'lib' },
            { x:  30, y: 25, length: 50, width: 14, orientation: 'y', label: 'utils' },
          ]);
          paintBuildings(ctx, [
            { x: -45, y: -12, w: 10, d: 6, h: 22, orient: 's' },
            { x: -15, y: -12, w: 10, d: 6, h: 30, orient: 's' },
            { x:  15, y: -12, w: 10, d: 6, h: 18, orient: 's' },
            { x:  45, y: -12, w: 10, d: 6, h: 26, orient: 's' },
          ]);
        }
      },
      {
        title: "Nested: branch with own files",
        meta: "2 levels deep",
        bounds: { x: 50, y: 60, h: 32 },
        draw: function (ctx) {
          drawStreets(ctx, [
            { x: 0, y: 0, length: 60, width: 14, label: 'app' },
            // Branch starts at main's centerline (y=0), extends to y=54
            { x: 0, y: 27, length: 54, width: 14, orientation: 'y', label: 'utils' },
          ]);
          paintBuildings(ctx, [
            { x: -20, y: -12, w: 10, d: 6, h: 25, orient: 's' },
            { x:  20, y: -12, w: 10, d: 6, h: 30, orient: 's' },
          ]);
          paintBuildings(ctx, [
            { x: -12, y: 22, w: 6, d: 8, h: 18, hue: 145, orient: 'e' },
            { x: -12, y: 47, w: 6, d: 8, h: 22, hue: 145, orient: 'e' },
            { x:  12, y: 22, w: 6, d: 8, h: 16, hue: 145, orient: 'w' },
            { x:  12, y: 47, w: 6, d: 8, h: 28, hue: 145, orient: 'w' },
          ]);
        }
      },
      {
        title: "Deep tree: 3 levels",
        meta: "main → branch → branch",
        bounds: { x: 60, y: 60, h: 32 },
        draw: function (ctx) {
          drawStreets(ctx, [
            // Level 1 — main, X-oriented
            { x: 0, y: 0, length: 80, width: 14, label: 'src' },
            // Level 2 — Y-branch from main's centerline, extends to y=54
            { x: 0, y: 27, length: 54, width: 14, orientation: 'y', label: 'components' },
            // Level 3 — X-branch attached in the MIDDLE of level-2 (not at
            // its end). Centered at y=30, well inside level-2's y range.
            { x: 20, y: 30, length: 40, width: 12, orientation: 'x', label: 'icons' },
          ]);
          paintBuildings(ctx, [
            { x: -25, y: -12, w: 8, d: 6, h: 22, orient: 's' },
            { x:  25, y: -12, w: 8, d: 6, h: 18, orient: 's' },
          ]);
          // Level-2 buildings — repositioned to clear level-3's footprint (y 24-36)
          paintBuildings(ctx, [
            { x: -12, y: 15, w: 6, d: 8, h: 18, hue: 145, orient: 'e' },
            { x: -12, y: 47, w: 6, d: 8, h: 24, hue: 145, orient: 'e' },
          ]);
          // Level-3 buildings — south of level-3 (face north toward it)
          paintBuildings(ctx, [
            { x: 16, y: 20, w: 6, d: 5, h: 14, hue: 50, orient: 's' },
            { x: 30, y: 20, w: 6, d: 5, h: 16, hue: 50, orient: 's' },
          ]);
        }
      },
    ];

    // =========================================================================
    // RENDER HARNESS
    // =========================================================================

    var grid = document.getElementById('grid');
    var showCentersChk = document.getElementById('showCenters');

    function buildGrid() {
      grid.innerHTML = '';
      for (var i = 0; i < SCENARIOS.length; i++) {
        var s = SCENARIOS[i];
        if (s.section) {
          var section = document.createElement('div');
          section.className = 'section';
          section.textContent = s.section;
          grid.appendChild(section);
          continue;
        }
        renderCell(s);
      }
    }

    function renderCell(scenario) {
      var cell = document.createElement('div');
      cell.className = 'cell';

      var title = document.createElement('div');
      title.className = 'title';
      title.textContent = scenario.title;
      cell.appendChild(title);

      var canvas = document.createElement('canvas');
      cell.appendChild(canvas);

      if (scenario.meta) {
        var meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = scenario.meta;
        cell.appendChild(meta);
      }

      grid.appendChild(cell);

      // Set up canvas with DPR
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      var W = rect.width;
      var H = rect.height;

      // Compute screen-space bounding box from the scenario's world bounds
      var bx = scenario.bounds.x;
      var by = scenario.bounds.y;
      var maxH = scenario.bounds.h || 0;

      var corners = [];
      var xs = [-bx, bx], ys = [-by, by], zs = [0, maxH];
      for (var ix = 0; ix < 2; ix++) {
        for (var iy = 0; iy < 2; iy++) {
          for (var iz = 0; iz < 2; iz++) {
            corners.push(isoProject(xs[ix], ys[iy], zs[iz]));
          }
        }
      }

      var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (var i = 0; i < corners.length; i++) {
        if (corners[i].sx < minX) minX = corners[i].sx;
        if (corners[i].sx > maxX) maxX = corners[i].sx;
        if (corners[i].sy < minY) minY = corners[i].sy;
        if (corners[i].sy > maxY) maxY = corners[i].sy;
      }

      var bbW = maxX - minX, bbH = maxY - minY;
      var margin = 16;
      var scale = Math.min((W - margin) / bbW, (H - margin) / bbH);

      ctx.translate(W / 2, H / 2);
      ctx.scale(scale, scale);
      ctx.translate(-(minX + maxX) / 2, -(minY + maxY) / 2);

      // Optional debug overlay: bounds rectangle + world origin
      if (showCentersChk.checked) {
        var bp = [
          isoProject(-bx, -by, 0),
          isoProject( bx, -by, 0),
          isoProject( bx,  by, 0),
          isoProject(-bx,  by, 0),
        ];
        ctx.beginPath();
        ctx.moveTo(bp[0].sx, bp[0].sy);
        for (var k = 1; k < 4; k++) ctx.lineTo(bp[k].sx, bp[k].sy);
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255, 100, 100, 0.4)';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        var origin = isoProject(0, 0, 0);
        ctx.beginPath();
        ctx.arc(origin.sx, origin.sy, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = '#ff6464';
        ctx.fill();
      }

      scenario.draw(ctx);
    }

    showCentersChk.addEventListener('change', buildGrid);
    window.addEventListener('resize', buildGrid);

    buildGrid();
  </script>
</body>
</html>
