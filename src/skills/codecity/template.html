<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeCity — __PROJECT_NAME__</title>
  <style>
__STYLES__
  </style>
</head>
<body>
  <div id="tree-sidebar"></div>
  <canvas id="city"></canvas>
  <div id="sidebar"></div>

  <!-- Three.js loaded via ESM + import map. The file works from `file://`
       with no server, but the first open needs a network connection to
       download Three.js from jsdelivr. -->
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>

  <!-- All renderer sources + MANIFEST + CONFIG, inlined by build.sh. -->
  <script>
__BUNDLE__
  </script>

  <!-- Boot: expose THREE + OrbitControls as globals for the classic-script
       renderer, then start the scene. -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    startRenderLoop(document.getElementById('city'), MANIFEST, CONFIG);
  </script>
</body>
</html>
